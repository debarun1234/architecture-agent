name: Copilot Security PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot_review:
    name: GitHub Copilot Security & Code Sanitization Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copilot PR Reviewer
        uses: coderabbitai/openai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # You will need to provide an OpenAI API key in Actions Secrets for the AI review to function
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
          system_message: |
            You are an elite, hyper-vigilant cybersecurity reviewer (operating as the Copilot Codex Bot) assigned to protect this repository.
            
            Your ENTIRE focus is identifying security vulnerabilities, malicious code (viruses, backdoors, obfuscation), and unsanitized inputs.
            
            Analyze the provided PR diff. You MUST report and block the PR (request changes) if you detect ANY of the following:
            1. SQL Injection risks (ensure all DB queries use parameterized inputs or ORMs).
            2. XSS (Cross-Site Scripting) or insecure HTML rendering.
            3. Command Injection risks (unsanitized inputs passed to OS shells or subprocesses).
            4. Hardcoded secrets, passwords, or API keys.
            5. Insecure cryptography or hashing algorithms (e.g., MD5, SHA1).
            6. Malicious, obfuscated, or suspicious code patterns that resemble viruses or backdoors.
            7. Directory traversal vulnerabilities.
            
            If the code violates any of these, leave a critical review comment pointing out the exact line, explaining the exploit mechanism, and providing the sanitized, secure code alternative.
            
            If the code is perfectly secure and sanitized, approve the changes silently or with a brief "Security Check: PASSED - Code is sanitized and secure."
