name: Frontend CI — Vercel Deploy

# Triggers ONLY on frontend file changes.
# The main deploy.yml (Cloud Run / Docker / Terraform) skips its build stages
# when only these paths change, so there is no overlap.
on:
  push:
    branches: [master, main, 'feature/**', 'bugfix/**', 'hotfix/**']
    paths:
      - 'frontend/**'
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  # ── Build & lint check (runs on every push & PR) ──────────────────────────
  build-check:
    name: "Frontend — Build & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Audit at high+ severity. Only fails the job on HIGH/CRITICAL.
      - name: Security audit (npm)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build

  # ── Deploy to Vercel (production — master/main push only) ─────────────────
  deploy-vercel:
    name: "Frontend — Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: build-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment: production   # re-use the production environment gate
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Secrets required in GitHub repo → Settings → Secrets:
      #   VERCEL_TOKEN      — from vercel.com/account/tokens
      #   VERCEL_ORG_ID     — team_AY7NE8Ny3cHCXglCNmWWqDo2
      #   VERCEL_PROJECT_ID — prj_BssKKcfNvwIf13xKXDsvn0NiH8Ja  (arch-review-ai)
      - name: Deploy to Vercel production
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print deployment URL
        run: |
          URL=$(vercel ls arch-review-ai --token=${{ secrets.VERCEL_TOKEN }} --meta --yes 2>/dev/null | grep "https://" | head -1 | awk '{print $2}' || echo "https://arch-review-ai.vercel.app")
          echo "🚀 Frontend live at ${URL}"
